name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e '.[test]'

      - name: Prepare artifacts folder
        run: mkdir -p artifacts

      - name: Ruff (capture output)
        continue-on-error: true
        run: |
          ruff check src tests > artifacts/ruff.log 2>&1 || true

      - name: Mypy (capture output)
        continue-on-error: true
        run: |
          mypy src > artifacts/mypy.log 2>&1 || true

      - name: Run tests (capture output)
        run: |
          pytest -q > artifacts/pytest.log 2>&1 || (cat artifacts/pytest.log && exit 1)

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: artifacts/
