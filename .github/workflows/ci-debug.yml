name: CI Debug

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install -e '.[test]'

      - name: Run ruff and capture output
        run: |
          mkdir -p artifacts
          ruff check src tests > artifacts/ruff.log 2>&1 || true

      - name: Run mypy and capture output
        run: |
          mypy src > artifacts/mypy.log 2>&1 || true

      - name: Run pytest and capture output
        run: |
          pytest -q > artifacts/pytest.log 2>&1 || true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: artifacts/
